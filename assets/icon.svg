  <!-- Lock shackle -->
  <path d="M228 260v-30a28 28 0 0156 0v30" fill="none" stroke="url(#shield)" stroke-width="12" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="256" cy="285" r="8" fill="#6366f1"/>
  <rect x="253" y="285" width="6" height="16" rx="2" fill="#6366f1"/>
</svg>
